name: Playwright Tests

on:
  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose Environment to Run Tests Against"
        required: true
        default: "Staging"
        type: choice
        options: ["UAT", "Staging"]
      test_type:
        description: "Choose Test Suite to Run"
        required: true
        default: "All"
        type: choice
        options: ["Smoke", "Regression", "All"]
      test_name_filter:
        description: "Optional: Filter tests by name (regex supported)"
        required: false
        default: ""
        type: string
  # Scheduled — runs automatically
  schedule:
    - cron: "0 5 * * 1-5" # 12:00 AM (midnight) EST
    - cron: "0 17 * * 1-5" # 12:00 PM (noon) EST

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
      fail-fast: false
    env:
      TEST_SUITE: ${{ github.event.inputs.test_type || 'All' }}
      TEST_NAME_FILTER: ${{ github.event.inputs.test_name_filter || '' }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'Staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # ✅ Fix #7: pin to a stable LTS version instead of lts/*
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ env.ENVIRONMENT == 'UAT' && 'https://uat.example.com' || 'https://staging.example.com' }}
        run: |
          echo "Environment : $ENVIRONMENT (BASE_URL=$BASE_URL)"
          echo "Test suite  : $TEST_SUITE"
          echo "Name filter : $TEST_NAME_FILTER"

          if [ "$TEST_SUITE" = "Smoke" ]; then
            TAG="@smoke"
          elif [ "$TEST_SUITE" = "Regression" ]; then
            TAG="@regression"
          else
            TAG=""
          fi

          if [ -n "$TAG" ] && [ -n "$TEST_NAME_FILTER" ]; then
            # AND both conditions via a lookahead-style combined regex
            GREP_PATTERN="(?=.*${TAG})(?=.*${TEST_NAME_FILTER})"
          elif [ -n "$TAG" ]; then
            GREP_PATTERN="$TAG"
          elif [ -n "$TEST_NAME_FILTER" ]; then
            GREP_PATTERN="$TEST_NAME_FILTER"
          else
            GREP_PATTERN=""
          fi

          if [ -n "$GREP_PATTERN" ]; then
            npx playwright test --grep "$GREP_PATTERN" \
              --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
              --reporter=html,blob
          else
            npx playwright test \
              --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
              --reporter=html,blob
          fi

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ env.TEST_SUITE }}-shard-${{ matrix.shardIndex }}-attempt-${{ github.run_attempt }}
          path: blob-report
          retention-days: 14

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    env:
      TEST_SUITE: ${{ github.event.inputs.test_type || 'All' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ env.TEST_SUITE }}-attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14
